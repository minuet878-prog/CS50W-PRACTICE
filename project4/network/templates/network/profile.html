{% extends "network/layout.html" %}

{% block body %}
    <h1 style="padding: 10px;">{{ profile_user.username }}</h1>
    <h2 style="padding: 10px;">Follow: {{ follow }}</h2>
    <h2 style="padding: 10px;">Follower: {{ follower}}</h2>
    {% for post in posts %}
    <div class="card-box">
        <p><a class="post-author" href="{% url 'profile' post.poster.id %}">{{ post.poster }}</a></p>
        <a href="{% url 'edit' %}">edit</a>
        <p>{{ post.content }}</p>
        <p class="post-time">{{ post.post_time }}</p>
        <p>{{ post.like.count }}</p>
    </div>
    {% endfor %}
{% endblock %}
