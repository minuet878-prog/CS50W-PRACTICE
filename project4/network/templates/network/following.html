{% extends "network/layout.html" %}

{% block body %}
    <h2 style="padding:10px;">Following</h2>
    {% for post in posts %}
        <div class="card-box">
            <p><a class="post-author" href="{% url 'profile' post.poster.id %}">{{ post.poster }}</a></p>
            <a href="{% url 'edit' %}">edit</a>
            <p>{{ post.content }}</p>
            <p class="post-time">{{ post.post_time }}</p>
            <p>{{ post.like.count }}</p>
        </div>
    {% endfor %}
    <div style="padding: 20px; text-align: center;">
        {% if posts.has_previous %}
            <a class="btn btn-primary" href="?page={{ posts.previous_page_number }}" >Previous</a>
        {% endif %}
        {% if posts.has_next %}
            <a class="btn btn-primary" href="?page={{ posts.next_page_number }}">Next</a>
        {% endif %}
    </div>
{% endblock %}
