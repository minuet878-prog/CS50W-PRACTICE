<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Search</title>
        <style>
            body {
                justify-content: center;
                align-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
            }
            div.search {
                display: flex;
                justify-content: center;
                text-align: center;
            }
            .search-box {
                border-radius: 24px;
                width: 100%;
                height: 40px;
                border: 1px solid #c8c8c8;
                box-shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
                font-size: 16px;
                font-family: Roboto, sans-serif;
                padding: 0 20px;
                color: #202124;
            }
            .search-btn {
                border-radius: 8px;
                padding: 0 20px;
                height: 40px;
                border: none;
                font-family: Roboto, sans-serif;
                font-weight: bold;
            }
            .button {
                display: flex;
                justify-content: center;
                width: 100%;
                margin-top: 20px;
                gap: 15px;
            }
            form {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                width: 90%;
                max-width: 650px;
            }
            img {
                width: 272px;
                margin-bottom: 30px;
            }
            nav.left {
                position: fixed;
                top: 10px;
                left: 10px;
            }
            nav.right {
                position: fixed;
                top: 10px;
                right: 10px;
            }
            nav a {
                margin-left: 15px;
                text-decoration: none;
                font-size: 14px;
                color: black;
            }
            .bottom1 {
            position: fixed;
            bottom: 40px;
            left: 0;
            right: 0;
            background-color: #f2f2f2;
            padding: 10px 30px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 14px;
            }
            .bottom2 {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #f2f2f2;
            display: flex;
            justify-content: space-around;
            padding: 10px;
            }
            .ad, .private {
            display: flex;
            gap: 15px;
            }
        </style>
    </head>
    <body>
        <nav class ="left">
            <a href="https://about.google/">關於 Google</a>
            <a href="https://store.google.com/">Google 商店</a>
        </nav>
        <nav class="right">
            <a href="advanced_search.html">進階搜尋</a>
            <a href="img_search.html">圖片</a>
        </nav>
        <div class ="search">
            <form action="https://www.google.com/search">
                <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google">
                <input class = "search-box" type="text" name="q">
                <div class ="button">
                    <input class = "search-btn" type="submit" value="Google Search">
                    <a href="https://www.google.com/doodles">
                        <input class = "search-btn" type ="submit" name="btnI" value="I'm Feeling Lucky">
                    </a>
                    
                </div>
            </form>
        </div>
        <nav class="bottom1">
            台灣
        </nav>
        <nav class="bottom2">
            <div class="ad">
                <a href="https://business.google.com/tw/google-ads/">廣告</a>
                <a href="https://business.google.com/tw/business-profile/">商業</a>
                <a href="https://www.google.com/search/howsearchworks/">搜尋服務的運作方式</a>
            </div>
            <div class="private">
                <a href="https://policies.google.com/privacy?">隱私權</a>
                <a href="https://policies.google.com/terms">服務條款</a>
                <a href="https://www.google.com/preferences">設定</a>
            </div>
        </nav>
    </body>
</html>
